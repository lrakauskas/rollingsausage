name: NativePHP Google AdMob Docs Deploy

on:
  push:
    branches:
      - main
    paths:
      - '_backend/nativephp-google-admob-docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out public docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: pip install -r _backend/nativephp-google-admob-docs/requirements.txt

      - name: Configure git committer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main --depth=1 || true

      - name: Deploy docs with mike
        run: python _backend/nativephp-google-admob-docs/scripts/deploy_docs.py --push

      - name: Upload built site artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nativephp-google-admob-site-preview
          path: _backend/nativephp-google-admob-docs/site
